services:
  api:
    build:
      context: ./Src
      dockerfile: Dockerfile
    container_name: safechem_api
    working_dir: /app
    volumes:
      - ./Src:/app
    environment:
      DATABASE_URL: postgresql+psycopg2://safechem:safechem@db:5432/safechem
      PRIVATE_KEY_PATH: /app/keys/private_key.pem
      GAME_APP_ID: safechem-unity-client
      API_HOST: 0.0.0.0
      API_PORT: "8000"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  db:
    image: postgres:16
    container_name: safechem_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: safechem
      POSTGRES_USER: safechem
      POSTGRES_PASSWORD: safechem
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U safechem -d safechem"]
      interval: 5s
      timeout: 3s
      retries: 20

  adminer:
    image: adminer:latest
    container_name: safechem_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
